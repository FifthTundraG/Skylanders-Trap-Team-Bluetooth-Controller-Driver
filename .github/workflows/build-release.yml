name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync -v

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Build executable
        run: |
          uv run pyinstaller ^
            --onefile ^
            --name Skylanders-Gamepad-Driver ^
            main.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Skylanders-Gamepad-Driver.exe